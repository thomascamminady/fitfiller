# Production compose for the Hetzner host. Unlike docker-compose.yml (which
# builds locally), this pulls the images published to GHCR by the Deploy
# workflow. Put this file + Caddyfile on the host and let CD run:
#   docker compose -f docker-compose.prod.yml pull && up -d
# Override REGISTRY_OWNER if your images live under a different namespace.
services:
  api:
    image: ghcr.io/${REGISTRY_OWNER:-thomascamminady}/fitfiller-api:latest
    restart: unless-stopped
    environment:
      PORT: 3001
      HOST: 0.0.0.0
      CORS_ORIGIN: ${PUBLIC_ORIGIN:-https://fitfiller.example}
      AUTH_PROVIDER: ${AUTH_PROVIDER:-dev}
      DEV_FORCE_PREMIUM: ${DEV_FORCE_PREMIUM:-false}
      ELEVATION_PROVIDER: ${ELEVATION_PROVIDER:-opentopodata}
      ELEVATION_API_URL: ${ELEVATION_API_URL:-}
      ELEVATION_API_KEY: ${ELEVATION_API_KEY:-}
    expose:
      - '3001'

  web:
    image: ghcr.io/${REGISTRY_OWNER:-thomascamminady}/fitfiller-web:latest
    restart: unless-stopped
    expose:
      - '80'

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
