# Production-ish compose for a single Hetzner host. Caddy terminates TLS and
# routes / to the web container and /api to the API container.
services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3001
      HOST: 0.0.0.0
      CORS_ORIGIN: ${PUBLIC_ORIGIN:-https://fitfiller.example}
      AUTH_PROVIDER: ${AUTH_PROVIDER:-dev}
      DEV_FORCE_PREMIUM: ${DEV_FORCE_PREMIUM:-false}
      ELEVATION_PROVIDER: ${ELEVATION_PROVIDER:-opentopodata}
      ELEVATION_API_URL: ${ELEVATION_API_URL:-}
      ELEVATION_API_KEY: ${ELEVATION_API_KEY:-}
      ROUTING_PROVIDER: ${ROUTING_PROVIDER:-brouter}
      ROUTING_URL: ${ROUTING_URL:-}
      ROUTING_PROFILE: ${ROUTING_PROFILE:-trekking}
    expose:
      - "3001"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_MAP_STYLE: ${VITE_MAP_STYLE:-https://tiles.openfreemap.org/styles/liberty}
    restart: unless-stopped
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
